<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- titulo e favicon - definir o ícone da aba do navegador-->
    <title>Org-limp</title>
    <link rel="shortcut icon" href="./img/logo2.png" type="image/x-icon">
    <!-- BOOTSTRAP - CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
   
</head>

<body>

    <div class="login-container" style="display: flex;  
            min-height: 100vh;" >
        <!-- Seção esquerda: Imagem da marca -->
        <aside class="login-banner" style="flex: 1; background-color: #000; display: flex;
             justify-content: center; align-items: center;">
            <img src="./img/logo.png" class="img-fluid" alt="Logo de la empresa">

        </aside>

        <!-- Seção Direita: Formulário de acesso -->
        <div class="login-content" style="flex: 1; background-color: #fff; display: flex; flex-direction: column;
         justify-content: center; padding: 40px;">
            <h1 class="text-center mb-4">Bem-vindo de volta!</h1>
            <h6 class="text-center mb-4">Entre com suas credenciais para acessar o sistema</h6>
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <form>
                        <div class="mb-3">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" class="form-control text-input" id="email"
                                placeholder="Digite seu e-mail">

                            <div class="mb-3">
                                <label for="password" class="form-label">Senha</label>
                                <input type="password" class="form-control text-input" id="password"
                                    placeholder="************">
                                <label for="remember" class="form-check-label">
                                    <input type="checkbox" class="form-check-input" id="remember"> Lembre de mim</label>
                                <h6 class="mt-2"><a href="#" class="text-decoration-none">Esqueceu sua senha?</a></h6>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Entrar</button>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</body>

</html>
